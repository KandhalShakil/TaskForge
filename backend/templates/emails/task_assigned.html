<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Task Assigned</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .container { max-width: 600px; margin: 40px auto; background-color: #1e293b; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header { background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%); padding: 40px 20px; text-align: center; }
        .content { padding: 40px; text-align: left; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; text-align: center; }
        p { line-height: 1.6; color: #94a3b8; font-size: 16px; }
        .task-box { background-color: #334155; padding: 20px; border-radius: 12px; margin: 20px 0; border-left: 4px solid #f59e0b; }
        .task-title { font-size: 18px; font-weight: 700; color: #f1f5f9; margin-bottom: 5px; }
        .task-meta { font-size: 14px; color: #cbd5e1; }
        .btn { display: block; text-align: center; padding: 14px 32px; background-color: #f59e0b; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 25px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>New Task Assigned</h1>
        </div>
        <div class="content">
            <p>Hi {{ assignee_name }},</p>
            <p>You have been assigned a new task on TaskForge.</p>
            <div class="task-box">
                <div class="task-title">{{ task_title }}</div>
                <div class="task-meta">Project: {{ project_name }}</div>
                {% if due_date %}
                <div class="task-meta">Due Date: {{ due_date }}</div>
                {% endif %}
            </div>
            <a href="{{ task_url }}" class="btn">View Task Details</a>
        </div>
        <div class="footer">
            &copy; 2026 TaskForge. All rights reserved.
        </div>
    </div>
</body>
</html>
