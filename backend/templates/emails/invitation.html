<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation to Join</title>
    <style>
        body { margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .container { max-width: 600px; margin: 40px auto; background-color: #1e293b; border-radius: 16px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .header { background: linear-gradient(135deg, #8b5cf6 0%, #7c3aed 100%); padding: 40px 20px; text-align: center; }
        .content { padding: 40px; text-align: center; }
        h1 { margin: 0; font-size: 28px; font-weight: 700; }
        p { line-height: 1.6; color: #94a3b8; font-size: 16px; }
        .btn { display: inline-block; padding: 14px 32px; background-color: #8b5cf6; color: #ffffff !important; text-decoration: none; border-radius: 8px; font-weight: 600; margin-top: 25px; }
        .footer { padding: 20px; text-align: center; font-size: 12px; color: #64748b; border-top: 1px solid #334155; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>You're Invited!</h1>
        </div>
        <div class="content">
            <p>Hi,</p>
            <p><strong>{{ inviter_name }}</strong> has invited you to join the <strong>{{ workspace_name }}</strong> workspace on TaskForge.</p>
            <p>Collaborate on projects, track tasks, and stay productive with your team.</p>
            <a href="{{ join_url }}" class="btn">Accept Invitation</a>
        </div>
        <div class="footer">
            &copy; 2026 TaskForge. All rights reserved.
        </div>
    </div>
</body>
</html>
